<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackEats Worker Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .worker-shell {
        width: min(1100px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }

      .worker-header,
      .worker-section,
      .worker-card,
      .worker-login {
        border-radius: 24px;
        padding: 1.25rem;
      }

      .worker-header,
      .worker-section,
      .worker-card,
      .worker-login {
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .worker-header,
      .worker-controls,
      .worker-topline,
      .worker-meta,
      .worker-actions {
        display: flex;
        gap: 1rem;
      }

      .worker-header,
      .worker-controls,
      .worker-actions {
        justify-content: space-between;
        align-items: center;
      }

      .worker-layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 1rem;
        margin-top: 1rem;
      }

      .worker-list {
        display: grid;
        gap: 1rem;
      }

      .worker-card h3,
      .worker-card p,
      .worker-section h2 {
        margin-top: 0;
      }

      .worker-topline {
        justify-content: space-between;
        align-items: start;
      }

      .worker-status {
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text-muted);
      }

      .worker-meta {
        flex-wrap: wrap;
        color: var(--text-muted);
      }

      .worker-meta span {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 0.45rem 0.75rem;
      }

      .worker-card label,
      .worker-login label {
        display: grid;
        gap: 0.45rem;
        color: var(--text-muted);
      }

      .worker-card input,
      .worker-login input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 16px;
        padding: 0.85rem 1rem;
      }

      .empty-state {
        color: var(--text-muted);
      }

      @media (max-width: 820px) {
        .worker-layout {
          grid-template-columns: 1fr;
        }

        .worker-header,
        .worker-controls,
        .worker-actions,
        .worker-topline {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="worker-shell">
      <header class="worker-header">
        <div>
          <p class="eyebrow">Delivery board</p>
          <h1>HackEats Worker Queue</h1>
          <p class="hero-text">
            See the next paid order, mark completed deliveries, and keep runners in sync.
          </p>
        </div>
        <div class="worker-controls">
          <button id="refresh-orders" class="primary-button" type="button">Refresh</button>
        </div>
      </header>

      <section id="worker-login" class="worker-login" hidden>
        <p class="section-label">Access</p>
        <h2>Enter worker access code</h2>
        <p class="hero-text">
          This code helps keep student room numbers and phone numbers private.
        </p>
        <form id="access-form" class="worker-actions">
          <label>
            Access code
            <input id="access-code" type="password" autocomplete="off" required />
          </label>
          <button class="primary-button" type="submit">Unlock queue</button>
        </form>
      </section>

      <div class="worker-layout">
        <section class="worker-section">
          <p class="section-label">Next up</p>
          <h2>Unfulfilled paid orders</h2>
          <div id="open-orders" class="worker-list"></div>
        </section>

        <section class="worker-section">
          <p class="section-label">Completed</p>
          <h2>Fulfilled orders</h2>
          <div id="fulfilled-orders" class="worker-list"></div>
        </section>
      </div>
    </div>

    <script src="./ops/app.js" type="module"></script>
  </body>
</html>
